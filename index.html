<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Labo JS Dynamique</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; background: #1e1e1e; color: white; }
        header { padding: 10px 20px; background: #252526; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .main { display: flex; flex: 1; overflow: hidden; }
        .editors { flex: 1; display: flex; flex-direction: column; border-right: 2px solid #333; }
        .editor-box { flex: 1; display: flex; flex-direction: column; }
        label { background: #333; padding: 5px 15px; font-size: 12px; text-transform: uppercase; color: #aaa; }
        textarea { flex: 1; background: #1e1e1e; color: #d4d4d4; border: none; padding: 15px; font-family: 'Consolas', monospace; font-size: 14px; resize: none; outline: none; }
        .preview { flex: 1; background: white; }
        iframe { width: 100%; height: 100%; border: none; background: white; }
        .btn-run { background: #007acc; color: white; border: none; padding: 8px 20px; cursor: pointer; border-radius: 3px; font-weight: bold; }
        .btn-run:hover { background: #005a9e; }
    </style>
</head>
<body>

<header>
    <span><strong>JS Intermediate</strong> - Dynamic Webpages Lab</span>
    <button class="btn-run" onclick="updatePreview()">Exécuter (Ctrl+S)</button>
</header>

<div class="main">
    <div class="editors">
        <div class="editor-box">
            <label>HTML</label>
            <textarea id="html-code" placeholder="Écris ton HTML ici..."><div id="box">Clique-moi !</div></textarea>
        </div>
        <div class="editor-box">
            <label>CSS</label>
            <textarea id="css-code" placeholder="Écris ton CSS ici...">#box { 
  width: 200px; padding: 20px; 
  background: coral; color: white; 
  text-align: center; cursor: pointer; 
  transition: 0.3s; border-radius: 8px;
}</textarea>
        </div>
        <div class="editor-box">
            <label>JavaScript</label>
            <textarea id="js-code" placeholder="Écris ton JS ici...">const el = document.getElementById('box');

el.onclick = function() {
  this.style.background = 'seagreen';
  this.innerHTML = 'DOM Manipulé ! 🎉';
};</textarea>
        </div>
    </div>

    <div class="preview">
        <iframe id="output"></iframe>
    </div>
</div>

<script>
    function updatePreview() {
        const html = document.getElementById("html-code").value;
        const css = "<style>" + document.getElementById("css-code").value + "</style>";
        const js = "<script>" + document.getElementById("js-code").value + "<\/script>";
        
        const output = document.getElementById("output").contentWindow.document;
        output.open();
        output.write(html + css + js);
        output.close();
    }

    // Exécuter au chargement
    window.onload = updatePreview;

    // Raccourci clavier Ctrl+S ou Cmd+S
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            updatePreview();
        }
    });
</script>

</body>
</html>
